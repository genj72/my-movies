<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>시호의 영화 컬렉션</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Noto+Sans+KR:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #fafaf8; --surface: #ffffff; --border: #e8e6e1; --border-light: #f0ede8;
    --text: #1a1a1a; --text-muted: #6b6560; --text-faint: #aaa8a3;
    --accent: #1a1a1a; --accent2: #8b7355; --gold: #c8a84b; --star: #8b7355;
    --pill-bg: #f0ede8; --pill-hover: #e8e3db; --tag-active: #1a1a1a; --tag-active-text: #ffffff;
    --shadow: 0 1px 3px rgba(0,0,0,.06), 0 4px 12px rgba(0,0,0,.04); --radius: 8px;
  }
  body { font-family: 'Noto Sans KR', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; font-size: 14px; line-height: 1.6; }

  /* LOADING */
  #loading-screen {
    position: fixed; inset: 0; background: var(--bg);
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    z-index: 9999; gap: 16px;
  }
  #loading-screen h2 { font-family: 'DM Serif Display', serif; font-size: 20px; font-weight: 400; color: var(--text-muted); }
  .spinner { width: 36px; height: 36px; border: 3px solid var(--border); border-top-color: var(--accent2); border-radius: 50%; animation: spin .8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  #loading-error { display: none; text-align: center; padding: 20px; color: #c0392b; font-size: 14px; max-width: 420px; line-height: 1.7; }
  #retry-btn { margin-top: 12px; padding: 8px 20px; border: 1px solid #c0392b; border-radius: var(--radius); background: none; color: #c0392b; font-family: inherit; font-size: 13px; cursor: pointer; }
  #retry-btn:hover { background: #c0392b; color: white; }

  /* HEADER */
  header { background: var(--surface); border-bottom: 1px solid var(--border); padding: 20px 32px; display: flex; align-items: baseline; gap: 16px; position: sticky; top: 0; z-index: 100; }
  header h1 { font-family: 'DM Serif Display', serif; font-size: 24px; font-weight: 400; letter-spacing: -0.5px; }
  header h1 span { font-style: italic; color: var(--accent2); }
  #count-display { font-size: 12px; color: var(--text-muted); font-weight: 300; margin-left: auto; }

  /* LAYOUT */
  .layout { display: grid; grid-template-columns: 260px 1fr; min-height: calc(100vh - 65px); }

  /* SIDEBAR */
  aside { background: var(--surface); border-right: 1px solid var(--border); padding: 24px 20px; overflow-y: auto; max-height: calc(100vh - 65px); position: sticky; top: 65px; }
  .sidebar-section { margin-bottom: 28px; }
  .sidebar-label { font-size: 10px; letter-spacing: 1.5px; text-transform: uppercase; color: var(--text-faint); font-weight: 500; margin-bottom: 10px; display: block; }

  .search-wrap { position: relative; margin-bottom: 28px; }
  #search-input { width: 100%; padding: 10px 14px 10px 36px; border: 1px solid var(--border); border-radius: var(--radius); background: var(--bg); font-family: inherit; font-size: 14px; color: var(--text); outline: none; transition: border-color .15s; }
  #search-input:focus { border-color: var(--accent2); }
  .search-icon { position: absolute; left: 11px; top: 50%; transform: translateY(-50%); color: var(--text-faint); font-size: 14px; }

  .grade-btns { display: flex; gap: 6px; flex-wrap: wrap; }
  .grade-btn { flex: 1; padding: 7px 4px; border: 1px solid var(--border); border-radius: var(--radius); background: var(--bg); cursor: pointer; font-size: 12px; text-align: center; transition: all .15s; font-family: inherit; color: var(--text-muted); min-width: 52px; }
  .grade-btn.active { background: var(--accent); border-color: var(--accent); color: white; }
  .grade-btn:hover:not(.active) { background: var(--pill-hover); }

  .checkbox-group { display: flex; flex-direction: column; gap: 2px; max-height: 160px; overflow-y: auto; }
  .checkbox-group::-webkit-scrollbar { width: 3px; }
  .checkbox-group::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
  .cb-item { display: flex; align-items: center; gap: 8px; padding: 4px 6px; border-radius: 4px; cursor: pointer; transition: background .1s; }
  .cb-item:hover { background: var(--border-light); }
  .cb-item input[type="checkbox"] { width: 13px; height: 13px; accent-color: var(--accent); cursor: pointer; flex-shrink: 0; }
  .cb-item label { font-size: 13px; color: var(--text); cursor: pointer; line-height: 1.3; }
  .cb-count { margin-left: auto; font-size: 10px; color: var(--text-faint); }

  .tag-cloud { display: flex; flex-wrap: wrap; gap: 5px; }
  .tag-pill { padding: 4px 10px; border-radius: 20px; background: var(--pill-bg); font-size: 12px; color: var(--text-muted); cursor: pointer; transition: all .15s; border: 1px solid transparent; white-space: nowrap; }
  .tag-pill:hover { background: var(--pill-hover); color: var(--text); }
  .tag-pill.active { background: var(--tag-active); color: var(--tag-active-text); border-color: var(--tag-active); }

  .sort-row { display: flex; gap: 6px; align-items: center; }
  select#sort-select { flex: 1; padding: 7px 10px; border: 1px solid var(--border); border-radius: var(--radius); background: var(--bg); font-family: inherit; font-size: 13px; color: var(--text); outline: none; cursor: pointer; }
  select#sort-select:focus { border-color: var(--accent2); }
  #reset-btn { padding: 7px 12px; border: 1px solid var(--border); border-radius: var(--radius); background: var(--bg); font-family: inherit; font-size: 12px; color: var(--text-muted); cursor: pointer; transition: all .15s; white-space: nowrap; }
  #reset-btn:hover { border-color: var(--accent); color: var(--accent); }

  #refresh-btn { padding: 8px 12px; border: 1px solid var(--border); border-radius: var(--radius); background: var(--bg); font-family: inherit; font-size: 12px; color: var(--text-muted); cursor: pointer; transition: all .15s; display: flex; align-items: center; gap: 5px; width: 100%; justify-content: center; }
  #refresh-btn:hover { border-color: var(--accent2); color: var(--accent2); }
  #refresh-btn .icon { display: inline-block; }
  #refresh-btn.spinning .icon { animation: spin .6s linear infinite; }

  /* MAIN */
  main { padding: 24px 28px; }
  #active-filters { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 16px; }
  .filter-chip { display: flex; align-items: center; gap: 5px; padding: 3px 10px 3px 12px; background: var(--accent); color: white; border-radius: 20px; font-size: 12px; cursor: pointer; }
  .filter-chip .chip-x { font-size: 14px; opacity: .7; }
  .filter-chip:hover .chip-x { opacity: 1; }

  #results-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(340px, 1fr)); gap: 12px; }

  .movie-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px; cursor: pointer; transition: box-shadow .15s, border-color .15s; }
  .movie-card:hover { box-shadow: var(--shadow); border-color: #d5d0c8; }
  .card-top { display: flex; align-items: flex-start; justify-content: space-between; gap: 8px; margin-bottom: 4px; }
  .card-title { font-size: 15px; font-weight: 500; color: var(--text); line-height: 1.3; }
  .card-title .sub { display: block; font-size: 12px; font-weight: 300; color: var(--text-muted); margin-top: 1px; }
  .grade-badge { flex-shrink: 0; font-size: 16px; line-height: 1; padding-top: 2px; }
  .grade-badge.masterpiece { color: var(--gold); }
  .grade-badge.hit { color: var(--star); }
  .card-meta { font-size: 12px; color: var(--text-muted); margin-bottom: 8px; display: flex; flex-wrap: wrap; gap: 4px 12px; }
  .card-meta span { display: inline-flex; align-items: center; gap: 3px; }
  .card-tags { display: flex; flex-wrap: wrap; gap: 4px; }
  .card-tag { padding: 2px 8px; border-radius: 12px; background: var(--pill-bg); font-size: 11px; color: var(--text-muted); }
  .card-badges { display: flex; gap: 4px; margin-top: 8px; }
  .badge { padding: 2px 8px; border-radius: 3px; font-size: 10px; font-weight: 500; letter-spacing: .3px; }
  .badge-criterion { background: #f0ede8; color: #8b7355; border: 1px solid #d5c9b8; }
  .badge-award { background: #f8f6ee; color: #7a6e3d; border: 1px solid #ddd5a0; }
  .badge-selection { background: #eef2f0; color: #4a6e5a; border: 1px solid #b0ccc0; }

  #no-results { text-align: center; padding: 80px 20px; color: var(--text-muted); display: none; }
  #no-results .big { font-size: 40px; margin-bottom: 12px; }

  /* MODAL */
  .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.45); z-index: 1000; align-items: center; justify-content: center; padding: 20px; }
  .modal-overlay.open { display: flex; }
  .modal { background: var(--surface); border-radius: 12px; max-width: 640px; width: 100%; max-height: 85vh; overflow-y: auto; box-shadow: 0 20px 60px rgba(0,0,0,.2); }
  .modal-header { padding: 24px 28px 20px; border-bottom: 1px solid var(--border); position: relative; }
  .modal-title { font-family: 'DM Serif Display', serif; font-size: 22px; font-weight: 400; line-height: 1.25; margin-bottom: 4px; }
  .modal-sub { font-size: 13px; color: var(--text-muted); font-style: italic; margin-bottom: 2px; }
  .modal-en { font-size: 13px; color: var(--text-faint); }
  .modal-close { position: absolute; top: 20px; right: 20px; width: 32px; height: 32px; border: 1px solid var(--border); border-radius: 50%; background: none; cursor: pointer; font-size: 18px; color: var(--text-muted); display: flex; align-items: center; justify-content: center; transition: all .15s; }
  .modal-close:hover { background: var(--border-light); color: var(--text); }
  .modal-body { padding: 24px 28px; }
  .modal-row { display: flex; margin-bottom: 14px; gap: 12px; }
  .modal-row-label { font-size: 11px; letter-spacing: .8px; text-transform: uppercase; color: var(--text-faint); font-weight: 500; width: 56px; flex-shrink: 0; padding-top: 1px; }
  .modal-row-value { font-size: 14px; color: var(--text); flex: 1; line-height: 1.5; }
  .modal-tags { display: flex; flex-wrap: wrap; gap: 5px; }
  .modal-tag { padding: 4px 12px; border-radius: 20px; background: var(--pill-bg); font-size: 12px; color: var(--text-muted); cursor: pointer; transition: all .15s; }
  .modal-tag:hover { background: var(--accent); color: white; }
  .modal-desc { background: var(--bg); border-radius: 6px; padding: 12px 14px; font-size: 13px; color: var(--text-muted); line-height: 1.7; border: 1px solid var(--border-light); }

  /* PAGINATION */
  #pagination { display: flex; justify-content: center; align-items: center; gap: 6px; padding: 28px 0 8px; }
  .page-btn { padding: 6px 12px; border: 1px solid var(--border); border-radius: var(--radius); background: var(--bg); font-family: inherit; font-size: 13px; cursor: pointer; color: var(--text-muted); transition: all .15s; min-width: 36px; text-align: center; }
  .page-btn:hover:not(:disabled) { border-color: var(--accent2); color: var(--accent); }
  .page-btn.active { background: var(--accent); border-color: var(--accent); color: white; }
  .page-btn:disabled { opacity: .35; cursor: not-allowed; }
  .page-info { font-size: 12px; color: var(--text-faint); padding: 0 6px; }

  @media (max-width: 768px) {
    .layout { grid-template-columns: 1fr; }
    aside { position: static; max-height: none; border-right: none; border-bottom: 1px solid var(--border); }
    #results-grid { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<div id="loading-screen">
  <div class="spinner"></div>
  <h2>영화 데이터 불러오는 중…</h2>
  <div id="loading-error">
    <p>데이터를 불러오지 못했습니다.<br>구글 시트 공유 설정을 확인해 주세요.<br>
    <small style="color:var(--text-faint)">(공유 → 링크가 있는 모든 사용자 → 뷰어)</small></p>
    <button id="retry-btn">다시 시도</button>
  </div>
</div>

<header>
  <h1>시호의 <span>영화 컬렉션</span></h1>
  <span id="count-display">—</span>
</header>

<div class="layout">
  <aside>
    <div class="search-wrap">
      <span class="search-icon">🔍</span>
      <input type="text" id="search-input" placeholder="제목, 감독, 배우 검색…">
    </div>

    <div class="sidebar-section">
      <span class="sidebar-label">정렬</span>
      <div class="sort-row">
        <select id="sort-select">
          <option value="id-asc">순번 (기본)</option>
          <option value="year-asc">연도 오름차순</option>
          <option value="year-desc">연도 내림차순</option>
          <option value="ko-asc">제목 가나다순</option>
          <option value="grade-desc">등급 높은순</option>
        </select>
        <button id="reset-btn">초기화</button>
      </div>
    </div>

    <div class="sidebar-section">
      <span class="sidebar-label">등급</span>
      <div class="grade-btns">
        <button class="grade-btn active" data-grade="">전체</button>
        <button class="grade-btn" data-grade="◎">◎ 마스터</button>
        <button class="grade-btn" data-grade="★">★ 히트작</button>
        <button class="grade-btn" data-grade="none">일반작</button>
      </div>
    </div>

    <div class="sidebar-section">
      <span class="sidebar-label">제작 연도</span>
      <div style="display:flex;gap:6px;align-items:center;">
        <input type="number" id="year-from" placeholder="시작" min="1900" max="2030"
          style="width:50%;padding:7px 10px;border:1px solid var(--border);border-radius:var(--radius);background:var(--bg);font-family:inherit;font-size:13px;color:var(--text);outline:none;">
        <span style="color:var(--text-faint);font-size:12px">~</span>
        <input type="number" id="year-to" placeholder="끝" min="1900" max="2030"
          style="width:50%;padding:7px 10px;border:1px solid var(--border);border-radius:var(--radius);background:var(--bg);font-family:inherit;font-size:13px;color:var(--text);outline:none;">
      </div>
    </div>

    <div class="sidebar-section">
      <span class="sidebar-label">특별 선정</span>
      <div class="tag-cloud">
        <span class="tag-pill" data-special="criterion">Criterion</span>
        <span class="tag-pill" data-special="awards">수상작</span>
        <span class="tag-pill" data-special="selections">선정작</span>
        <span class="tag-pill" data-special="none-grade">무등급</span>
      </div>
    </div>

    <div class="sidebar-section">
      <span class="sidebar-label">국가</span>
      <div class="checkbox-group" id="country-group"></div>
    </div>

    <div class="sidebar-section">
      <span class="sidebar-label">장르</span>
      <div class="checkbox-group" id="genre-group"></div>
    </div>

    <div class="sidebar-section">
      <span class="sidebar-label">시청 태그</span>
      <div class="tag-cloud" id="tag-cloud"></div>
    </div>

    <button id="refresh-btn">
      <span class="icon">↻</span> 데이터 새로고침
    </button>
  </aside>

  <main>
    <div id="active-filters"></div>
    <div id="results-grid"></div>
    <div id="no-results"><div class="big">🎬</div><p>검색 결과가 없습니다.</p></div>
    <div id="pagination"></div>
  </main>
</div>

<div class="modal-overlay" id="modal-overlay">
  <div class="modal">
    <div class="modal-header">
      <div id="m-grade" style="font-size:18px;margin-bottom:6px"></div>
      <div class="modal-title" id="m-ko"></div>
      <div class="modal-sub" id="m-orig"></div>
      <div class="modal-en" id="m-en"></div>
      <button class="modal-close" id="modal-close">✕</button>
    </div>
    <div class="modal-body" id="modal-body"></div>
  </div>
</div>

<script>
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
//  ★ 설정 — Apps Script URL이 바뀌면 여기만 수정
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbzr4-rf3IvdVdNZxv1cOxt79zDiM7tK93Q2lL6B0BH0wzEtBHz9k4ozwsi7_27qT6Vn/exec';
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
const PAGE_SIZE = 50;
const CACHE_KEY  = 'moviedb_v2';
const CACHE_TS   = 'moviedb_v2_ts';
const CACHE_TTL  = 30 * 60 * 1000; // 30분 캐시

let MOVIES = [];
let state  = freshState();

function freshState() {
  return { query:'', grade:'', yearFrom:'', yearTo:'', countries:new Set(), genres:new Set(),
           tags:new Set(), special:new Set(), sort:'id-asc', page:1 };
}

// ── Apps Script JSON → 영화 배열 변환 ──
function rowsToMovies(rows) {
  const movies = [];
  for (let i = 1; i < rows.length; i++) {
    const r = rows[i];
    if (!r[0]) continue;
    const v = col => {
      const val = r[col];
      const s = (val !== undefined && val !== null) ? String(val).trim() : '';
      return (s && s !== '-') ? s : '';
    };
    movies.push({
      id: parseInt(r[0]) || i, grade: v(1), en: v(2), orig: v(3), ko: v(4),
      year: v(5), country: v(6), genre: v(7), director: v(8), cast: v(9),
      tags: v(10), desc: v(11), criterion: v(12), awards: v(13), selections: v(14), note: v(15)
    });
  }
  return movies;
}

// ── 데이터 로드 (Apps Script JSON) ──
async function loadData(force = false) {
  const loadEl = document.getElementById('loading-screen');
  const errEl  = document.getElementById('loading-error');
  const h2     = loadEl.querySelector('h2');
  loadEl.style.display = 'flex'; errEl.style.display = 'none'; h2.style.display = 'block';

  if (!force) {
    try {
      const cached = localStorage.getItem(CACHE_KEY);
      const ts     = parseInt(localStorage.getItem(CACHE_TS) || '0');
      if (cached && Date.now() - ts < CACHE_TTL) {
        MOVIES = JSON.parse(cached);
        return onLoaded();
      }
    } catch(e) {}
  }

  try {
    const resp = await fetch(APPS_SCRIPT_URL);
    if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
    const rows = await resp.json();
    MOVIES = rowsToMovies(rows);
    if (!MOVIES.length) throw new Error('데이터 없음');
    try {
      localStorage.setItem(CACHE_KEY, JSON.stringify(MOVIES));
      localStorage.setItem(CACHE_TS, Date.now().toString());
    } catch(e) {}
    onLoaded();
  } catch(e) {
    console.error(e);
    h2.style.display = 'none';
    errEl.style.display = 'block';
  }
}

function onLoaded() {
  document.getElementById('loading-screen').style.display='none';
  buildFilters(); render();
}

// ── 필터 빌드 ──
function buildFilters() {
  const cc={}, gc={}, tc={};
  MOVIES.forEach(m => {
    if (m.country) { const p=m.country.split('/')[0].trim(); cc[p]=(cc[p]||0)+1; }
    if (m.genre)   { const g=m.genre.split('/')[0].trim();   gc[g]=(gc[g]||0)+1; }
    if (m.tags) m.tags.split(',').forEach(t => {
      t=t.trim();
      if (t&&t.length<20) tc[t]=(tc[t]||0)+1;
    });
  });

  document.getElementById('country-group').innerHTML =
    Object.entries(cc).sort((a,b)=>b[1]-a[1]).slice(0,20)
    .map(([c,n])=>`<label class="cb-item"><input type="checkbox" data-val="${c}" class="filter-country"><label>${c}</label><span class="cb-count">${n}</span></label>`).join('');

  document.getElementById('genre-group').innerHTML =
    Object.entries(gc).sort((a,b)=>b[1]-a[1]).slice(0,20)
    .map(([g,n])=>`<label class="cb-item"><input type="checkbox" data-val="${g}" class="filter-genre"><label>${g}</label><span class="cb-count">${n}</span></label>`).join('');

  document.getElementById('tag-cloud').innerHTML =
    Object.entries(tc).sort((a,b)=>b[1]-a[1]).filter(([t])=>t.length<15)
    .map(([t])=>`<span class="tag-pill" data-tag="${t}">${t}</span>`).join('');
}

// ── 필터·정렬 ──
function filterMovies() {
  const q = state.query.toLowerCase();
  return MOVIES.filter(m => {
    if (q && ![m.ko,m.en,m.orig,m.director,m.cast].join(' ').toLowerCase().includes(q)) return false;
    if (state.yearFrom && parseInt(m.year) < parseInt(state.yearFrom)) return false;
    if (state.yearTo   && parseInt(m.year) > parseInt(state.yearTo))   return false;
    if (state.grade==='◎' && m.grade!=='◎') return false;
    if (state.grade==='★' && m.grade!=='★') return false;
    if (state.grade==='none' && (m.grade==='◎'||m.grade==='★')) return false;
    if (state.countries.size>0 && !state.countries.has((m.country||'').split('/')[0].trim())) return false;
    if (state.genres.size>0   && !state.genres.has((m.genre||'').split('/')[0].trim()))    return false;
    if (state.tags.size>0) {
      const mt=(m.tags||'').split(',').map(t=>t.trim());
      if (![...state.tags].some(t=>mt.includes(t))) return false;
    }
    if (state.special.has('criterion')  && !m.criterion)  return false;
    if (state.special.has('awards')     && !m.awards)     return false;
    if (state.special.has('selections') && !m.selections) return false;
    if (state.special.has('none-grade') && (m.grade==='◎'||m.grade==='★')) return false;
    return true;
  });
}

function sortMovies(arr) {
  return [...arr].sort((a,b)=>{
    const s=state.sort;
    if (s==='id-asc')     return a.id-b.id;
    if (s==='year-asc')   return (a.year||'0').localeCompare(b.year||'0');
    if (s==='year-desc')  return (b.year||'0').localeCompare(a.year||'0');
    if (s==='ko-asc')     return (a.ko||a.en||'').localeCompare(b.ko||b.en||'','ko');
    if (s==='grade-desc') { const gv={'◎':2,'★':1,'':0}; return (gv[b.grade]||0)-(gv[a.grade]||0); }
    return 0;
  });
}

// ── 렌더 ──
function gIcon(g) {
  if (g==='◎') return '<span class="grade-badge masterpiece">◎</span>';
  if (g==='★') return '<span class="grade-badge hit">★</span>';
  return '';
}

function renderCards(movies) {
  const grid=document.getElementById('results-grid');
  const noRes=document.getElementById('no-results');
  const slice=movies.slice((state.page-1)*PAGE_SIZE, state.page*PAGE_SIZE);
  if (!movies.length) { grid.innerHTML=''; noRes.style.display='block'; return; }
  noRes.style.display='none';

  grid.innerHTML = slice.map(m => {
    const title = m.ko||m.en||m.orig||'';
    const sub   = (m.ko&&m.en&&m.en!==m.ko) ? `<span class="sub">${m.en}</span>` : '';
    const tags  = m.tags ? m.tags.split(',').slice(0,4).map(t=>`<span class="card-tag">${t.trim()}</span>`).join('') : '';
    const badges= [
      m.criterion  ? `<span class="badge badge-criterion">Criterion</span>` : '',
      m.awards     ? `<span class="badge badge-award">수상</span>` : '',
      m.selections ? `<span class="badge badge-selection">선정</span>` : '',
    ].join('');
    return `<div class="movie-card" data-id="${m.id}">
      <div class="card-top"><div class="card-title">${title}${sub}</div>${gIcon(m.grade)}</div>
      <div class="card-meta">
        ${m.year?`<span>📅 ${m.year}</span>`:''}
        ${m.country?`<span>🌏 ${m.country}</span>`:''}
        ${m.genre?`<span>🎭 ${m.genre}</span>`:''}
        ${m.director?`<span>🎬 ${m.director}</span>`:''}
      </div>
      ${tags?`<div class="card-tags">${tags}</div>`:''}
      ${badges?`<div class="card-badges">${badges}</div>`:''}
    </div>`;
  }).join('');

  grid.querySelectorAll('.movie-card').forEach(el=>
    el.addEventListener('click',()=>openModal(parseInt(el.dataset.id))));
}

function renderPagination(total) {
  const pages=Math.ceil(total/PAGE_SIZE);
  const pg=document.getElementById('pagination');
  if (pages<=1){pg.innerHTML='';return;}
  let html=`<button class="page-btn" id="prev-page" ${state.page===1?'disabled':''}>←</button>`;
  const range=[];
  for(let i=1;i<=pages;i++){
    if(i===1||i===pages||Math.abs(i-state.page)<=2) range.push(i);
    else if(range[range.length-1]!=='…') range.push('…');
  }
  range.forEach(p=>{
    if(p==='…') html+=`<span class="page-info">…</span>`;
    else html+=`<button class="page-btn${p===state.page?' active':''}" data-p="${p}">${p}</button>`;
  });
  html+=`<button class="page-btn" id="next-page" ${state.page===pages?'disabled':''}>→</button>`;
  pg.innerHTML=html;
  pg.querySelector('#prev-page')?.addEventListener('click',()=>{state.page--;render();scrollTo(0,0);});
  pg.querySelector('#next-page')?.addEventListener('click',()=>{state.page++;render();scrollTo(0,0);});
  pg.querySelectorAll('[data-p]').forEach(btn=>
    btn.addEventListener('click',()=>{state.page=parseInt(btn.dataset.p);render();scrollTo(0,0);}));
}

function renderActiveFilters() {
  const af=document.getElementById('active-filters');
  const chips=[];
  if(state.yearFrom || state.yearTo) {
    const label = state.yearFrom && state.yearTo ? `${state.yearFrom}~${state.yearTo}년`
                : state.yearFrom ? `${state.yearFrom}년 이후`
                : `${state.yearTo}년 이전`;
    chips.push({label, key:'year'});
  }
  if(state.grade) chips.push({label:state.grade==='none'?'일반작':`등급: ${state.grade}`,key:'grade'});
  state.countries.forEach(c=>chips.push({label:`국가: ${c}`,key:'country',val:c}));
  state.genres.forEach(g=>chips.push({label:`장르: ${g}`,key:'genre',val:g}));
  state.tags.forEach(t=>chips.push({label:`태그: ${t}`,key:'tag',val:t}));
  state.special.forEach(s=>chips.push({
    label:s==='criterion'?'Criterion':s==='awards'?'수상작':s==='selections'?'선정작':'무등급',
    key:'special',val:s
  }));
  af.innerHTML=chips.map((c,i)=>
    `<div class="filter-chip" data-i="${i}"><span>${c.label}</span><span class="chip-x">✕</span></div>`).join('');
  af.querySelectorAll('.filter-chip').forEach((el,i)=>{
    el.addEventListener('click',()=>{
      const ch=chips[i];
      if(ch.key==='year')    { state.yearFrom=''; state.yearTo=''; document.getElementById('year-from').value=''; document.getElementById('year-to').value=''; }
      if(ch.key==='grade')   state.grade='';
      if(ch.key==='country') state.countries.delete(ch.val);
      if(ch.key==='genre')   state.genres.delete(ch.val);
      if(ch.key==='tag')     state.tags.delete(ch.val);
      if(ch.key==='special') state.special.delete(ch.val);
      syncUI(); render();
    });
  });
}

function render() {
  const filtered=filterMovies(), sorted=sortMovies(filtered);
  renderActiveFilters(); renderCards(sorted); renderPagination(sorted.length);
  document.getElementById('count-display').textContent=
    `총 ${filtered.length.toLocaleString()}편 / ${MOVIES.length.toLocaleString()}편`;
}

function syncUI() {
  document.querySelectorAll('.grade-btn').forEach(b=>b.classList.toggle('active',b.dataset.grade===state.grade));
  document.querySelectorAll('.filter-country').forEach(cb=>cb.checked=state.countries.has(cb.dataset.val));
  document.querySelectorAll('.filter-genre').forEach(cb=>cb.checked=state.genres.has(cb.dataset.val));
  document.querySelectorAll('.tag-pill[data-tag]').forEach(p=>p.classList.toggle('active',state.tags.has(p.dataset.tag)));
  document.querySelectorAll('.tag-pill[data-special]').forEach(p=>p.classList.toggle('active',state.special.has(p.dataset.special)));
}

// ── 모달 ──
function openModal(id) {
  const m=MOVIES.find(x=>x.id===id); if(!m) return;
  document.getElementById('m-grade').innerHTML=
    m.grade==='◎'?'<span style="color:var(--gold)">◎ 마스터피스</span>':
    m.grade==='★'?'<span style="color:var(--star)">★ 히트작</span>':'';
  document.getElementById('m-ko').textContent  =m.ko||m.en||m.orig||'';
  document.getElementById('m-orig').textContent=(m.orig&&m.orig!==m.ko)?m.orig:'';
  document.getElementById('m-en').textContent  =(m.en&&m.en!==m.ko)?m.en:'';

  let body='';
  [['연도',m.year],['국가',m.country],['장르',m.genre],['감독',m.director],['배우',m.cast],
   ['Criterion',m.criterion],['수상',m.awards],['선정',m.selections],['비고',m.note]]
  .forEach(([l,v])=>{ if(v) body+=`<div class="modal-row"><div class="modal-row-label">${l}</div><div class="modal-row-value">${v}</div></div>`; });

  if(m.tags) {
    const tagHtml=m.tags.split(',').map(t=>`<span class="modal-tag" data-t="${t.trim()}">${t.trim()}</span>`).join('');
    body+=`<div class="modal-row"><div class="modal-row-label">태그</div><div class="modal-row-value"><div class="modal-tags">${tagHtml}</div></div></div>`;
  }
  if(m.desc) body+=`<div class="modal-row"><div class="modal-row-label">내용</div><div class="modal-row-value"><div class="modal-desc">${m.desc}</div></div></div>`;

  document.getElementById('modal-body').innerHTML=body;
  document.querySelectorAll('.modal-tag').forEach(el=>{
    el.addEventListener('click',()=>{
      const t=el.dataset.t;
      if(!state.tags.has(t)) state.tags.add(t);
      closeModal(); syncUI(); render();
    });
  });
  document.getElementById('modal-overlay').classList.add('open');
}
function closeModal() { document.getElementById('modal-overlay').classList.remove('open'); }

// ── 이벤트 ──
document.getElementById('search-input').addEventListener('input',e=>{state.query=e.target.value;state.page=1;render();});
document.getElementById('year-from').addEventListener('input',e=>{state.yearFrom=e.target.value;state.page=1;render();});
document.getElementById('year-to').addEventListener('input',e=>{state.yearTo=e.target.value;state.page=1;render();});
document.querySelectorAll('.grade-btn').forEach(btn=>btn.addEventListener('click',()=>{state.grade=btn.dataset.grade;state.page=1;syncUI();render();}));
document.getElementById('sort-select').addEventListener('change',e=>{state.sort=e.target.value;state.page=1;render();});
document.getElementById('reset-btn').addEventListener('click',()=>{
  state=freshState();
  document.getElementById('search-input').value='';
  document.getElementById('sort-select').value='id-asc';
  document.getElementById('year-from').value='';
  document.getElementById('year-to').value='';
  syncUI(); render();
});
document.getElementById('country-group').addEventListener('change',e=>{
  if(e.target.classList.contains('filter-country')){
    const v=e.target.dataset.val;
    e.target.checked?state.countries.add(v):state.countries.delete(v);
    state.page=1; render();
  }
});
document.getElementById('genre-group').addEventListener('change',e=>{
  if(e.target.classList.contains('filter-genre')){
    const v=e.target.dataset.val;
    e.target.checked?state.genres.add(v):state.genres.delete(v);
    state.page=1; render();
  }
});
document.getElementById('tag-cloud').addEventListener('click',e=>{
  const pill=e.target.closest('.tag-pill[data-tag]'); if(!pill) return;
  const t=pill.dataset.tag;
  state.tags.has(t)?state.tags.delete(t):state.tags.add(t);
  state.page=1; syncUI(); render();
});
document.querySelectorAll('.tag-pill[data-special]').forEach(p=>{
  p.addEventListener('click',()=>{
    const s=p.dataset.special;
    state.special.has(s)?state.special.delete(s):state.special.add(s);
    state.page=1; syncUI(); render();
  });
});
document.getElementById('modal-close').addEventListener('click',closeModal);
document.getElementById('modal-overlay').addEventListener('click',e=>{if(e.target===document.getElementById('modal-overlay'))closeModal();});
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeModal();});
document.getElementById('retry-btn').addEventListener('click',()=>loadData(true));
document.getElementById('refresh-btn').addEventListener('click',async()=>{
  const btn=document.getElementById('refresh-btn');
  btn.classList.add('spinning');
  try { localStorage.removeItem(CACHE_KEY); } catch(e){}
  await loadData(true);
  buildFilters(); render();
  btn.classList.remove('spinning');
});

// ── 시작 ──
loadData();
</script>
</body>
</html>
